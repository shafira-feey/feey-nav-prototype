<!--
  feey.ch — DESKTOP NAVIGATION · 6-VERSION VIEWER (team review)
  Full-screen tabbed viewer: tabs switch the version; each prototype fills the screen — NO scrolling.
   · Version 1   — split bar + slide-DOWN (full width)      → nav-desktop-placement-explorations.html?variant=1
   · Version 3   — split bar + slide-DOWN (centered card)   → nav-desktop-placement-explorations.html?variant=3
   · Seiten-Panel— centered logo / left nav + slide-IN       → nav-redesign-desktop.html (previously approved)
   · Version 4   — Ruhig: calm 2-column drop-down (Entdecken nach | Kategorien) → nav-desktop-calm.html
                   (designer feedback 2026-06-25: approved panel felt overwhelming; keep "Entdecken nach", calm it via type/colour/spacing)
   · Version 5   — Hybrid: visual tiles left + Entdecken nach · Wissen · Kategorien (last) → nav-desktop-hybrid.html
                   (Shafira 2026-06-25: combine V1's visual/shop-through-eyes with V4's calm familiarity)
   · Version 6   — Kategorien links: = V5 but Kategorien pulled far left + wider → nav-desktop-v6.html
                   (Shafira 2026-06-25: Kategorien (CTA) leads on the left; visual · Entdecken nach · Wissen follow)
  Each loads with embed=1 (no intro/switcher) and pre-opened on Zimmerpflanzen. Interaction works through the scale.
-->
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>feey · Desktop-Navigation — Versionen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--green-dark:#4A9A83;--beige:#D3CCB6;--dark-beige-15:#E8E6E4;--black:#141414;--fh:'Poppins',system-ui,sans-serif;--fb:'Karla',system-ui,sans-serif}
  *{box-sizing:border-box}html,body{height:100%;margin:0}
  body{font-family:var(--fb);background:#dfddd5;overflow:hidden}
  .bar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;gap:16px;padding:0 18px;background:#fff;border-bottom:1px solid var(--dark-beige-15);z-index:10;box-shadow:0 2px 14px rgba(20,20,20,.06)}
  .bar .ttl{font-family:var(--fh);font-weight:700;font-size:15px;letter-spacing:.3px}
  .bar .ttl span{color:var(--green-dark)}
  .tabs{display:flex;gap:8px;margin-left:auto}
  .tabs button{font-family:var(--fh);font-weight:600;font-size:12px;letter-spacing:.2px;border:1.5px solid var(--beige);background:#fff;border-radius:30px;padding:9px 16px;cursor:pointer;color:var(--black)}
  .tabs button:hover{border-color:var(--green-dark);color:var(--green-dark)}
  .tabs button.active{background:var(--black);color:#fff;border-color:var(--black)}
  .stage{position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden}
  #frame{width:100%;height:100%;border:0;display:block;background:#dfddd5}
  .hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-family:var(--fb);font-size:11px;color:#6b6a62;background:rgba(255,255,255,.78);padding:5px 13px;border-radius:20px;z-index:10}
</style>
</head>
<body>
  <div class="bar">
    <div class="ttl">feey · Desktop-Navigation — <span>6 Versionen</span></div>
    <div class="tabs">
      <button data-src="nav-desktop-placement-explorations.html?variant=1&amp;embed=1&amp;open=zimmer&amp;v=2" data-h="900" class="active">Version 1 · Slide-down</button>
      <button data-src="nav-desktop-placement-explorations.html?variant=3&amp;embed=1&amp;open=zimmer&amp;v=2" data-h="900">Version 3 · Karte</button>
      <button data-src="nav-redesign-desktop.html?embed=1&amp;menu=zimmer&amp;v=2" data-h="1015">Seiten-Panel · freigegeben</button>
      <button data-src="nav-desktop-calm.html?embed=1&amp;menu=zimmer&amp;v=2" data-h="1000">Version 4 · Ruhig</button>
      <button data-src="nav-desktop-hybrid.html?embed=1&amp;menu=zimmer&amp;v=2" data-h="1000">Version 5 · Hybrid</button>
      <button data-src="nav-desktop-v6.html?embed=1&amp;menu=zimmer&amp;v=2" data-h="1000">Version 6 · Kategorien links</button>
    </div>
  </div>
  <div class="stage"><iframe id="frame" title="Prototype"></iframe></div>
  <div class="hint">Tabs oben wechseln die Version · jede füllt den Bildschirm, kein Scrollen · klick Welten / „Nach Licht" zum Ausprobieren</div>

<script>
  var frame=document.getElementById('frame'), tabs=document.querySelectorAll('.tabs button');
  function load(btn){frame.src=btn.getAttribute('data-src');for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle('active',tabs[i]===btn);}
  for(var i=0;i<tabs.length;i++)tabs[i].onclick=(function(b){return function(){load(b);};})(tabs[i]);
  var _t=+(new URLSearchParams(location.search).get('tab')||1);
  load(tabs[(_t>=1&&_t<=tabs.length)?_t-1:0]);
</script>
</body>
</html>
